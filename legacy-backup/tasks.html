<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tasks</title>
<style>
    /* --- BASIC DESIGN --- */
    body {
        background-color: #0F0F0F; color: #fff;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center;
    }
    .container {
        width: 100%; max-width: 600px; background: #1a1a1a;
        padding: 30px; border-radius: 15px; border: 1px solid #333; margin-left: 60px;
    }
    h1 { margin-top: 0; font-weight: 300; letter-spacing: 1px; }
    
    /* --- TASK INPUT DESIGN --- */
    .task-input-group { display: flex; gap: 10px; margin-bottom: 30px; }
    .task-input {
        flex: 1; padding: 15px; background: #0F0F0F; border: 1px solid #333;
        border-radius: 10px; color: #fff; font-size: 16px; outline: none; transition: 0.3s;
    }
    .task-input:focus { border-color: #4da3ff; }
    .add-btn {
        padding: 0 25px; background: #182E1C; border: 1px solid #182E1C;
        border-radius: 10px; color: #42CC57; font-size: 16px; cursor: pointer; transition: 0.2s;
    }
    .add-btn:hover { background: #204026; }

    /* --- TASK LIST DESIGN --- */
    .task-list { list-style: none; padding: 0; margin: 0; }
    .task-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 15px; background: #0F0F0F; border: 1px solid #333;
        border-radius: 10px; margin-bottom: 10px; font-size: 18px; transition: 0.3s;
    }
    .task-item.completed { opacity: 0.5; text-decoration: line-through; border-color: #182E1C; }
    
    .task-content { display: flex; align-items: center; gap: 15px; cursor: pointer; flex: 1; }
    .checkbox {
        width: 20px; height: 20px; border-radius: 50%; border: 2px solid #555;
        display: inline-block; position: relative; transition: 0.2s;
    }
    .task-item.completed .checkbox { background: #42CC57; border-color: #42CC57; }
    
    .delete-btn {
        background: none; border: none; color: #FF352C; font-size: 20px;
        cursor: pointer; opacity: 0.7; transition: 0.2s;
    }
    .delete-btn:hover { opacity: 1; transform: scale(1.1); }

    /* --- SIDEBAR DESIGN (Same as others) --- */
    .bubble-sidebar {
        position: fixed; top: 20px; left: 20px; height: calc(100vh - 40px); width: 65px; 
        background: rgba(30, 30, 35, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; 
        box-shadow: 5px 10px 30px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.05); 
        transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden; z-index: 100;
        display: flex; flex-direction: column; align-items: center; padding: 20px 10px;
    }
    .bubble-sidebar:hover { width: 250px; }
    .centered-buttons { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; margin-top: 20px; }
    .bubble-btn {
        display: flex; align-items: center; width: 45px; height: 45px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.05); box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1), 0 5px 15px rgba(0,0,0,0.4);
        border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden;
    }
    .bubble-sidebar:hover .bubble-btn { width: 100%; border-radius: 15px; }
    .bubble-btn:hover { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); transform: translateY(-2px); }
    .bubble-icon { min-width: 24px; height: 24px; color: #888; margin-left: 10px; transition: color 0.3s ease; }
    .bubble-btn:hover .bubble-icon { color: #fff; }
    .bubble-text { color: #fff; font-size: 16px; margin-left: 15px; opacity: 0; white-space: nowrap; transition: opacity 0.3s ease; }
    .bubble-sidebar:hover .bubble-text { opacity: 1; transition-delay: 0.1s; }
</style>
</head>
<body>

    <nav class="bubble-sidebar">
        <div class="bubble-btn" id="menuToggleBtn" style="margin: 0 10px; width: 45px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <span class="bubble-text">Menu</span>
        </div>
        <div class="centered-buttons">
            <div class="bubble-btn" id="homeBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="bubble-text">Dashboard</span>
            </div>
            <div class="bubble-btn" id="historyBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
                <span class="bubble-text">History</span>
            </div>
            <div class="bubble-btn" id="analyticsBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg>
                <span class="bubble-text">Analytics</span>
            </div>
            <div class="bubble-btn" id="tasksBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                <span class="bubble-text">Tasks</span>
            </div>
        </div>
    </nav>

<div class="container">
    <h1>Daily Tasks</h1>
    
    <div class="task-input-group">
        <input type="text" id="taskInput" class="task-input" placeholder="What needs to be done today?">
        <button id="addBtn" class="add-btn">Add</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
</div>
<script src="tasks.js"></script>

</body>
</html>
