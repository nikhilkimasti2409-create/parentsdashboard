<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study History - JEE Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    /* ═══════════════════════════════════════════
       BASE STYLES & THEME
    ═══════════════════════════════════════════ */
    :root {
        --bg: #0F0F0F;
        --surface: rgba(25, 25, 30, 0.6);
        --border: rgba(255, 255, 255, 0.08);
        --font-display: 'Syne', sans-serif;
        --font-mono: 'DM Mono', monospace;
    }
    body {
        background-color: var(--bg); color: #fff;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0; padding: 0; min-height: 100vh; display: flex;
        overflow-x: hidden;
    }
    *, *::before, *::after { box-sizing: border-box; }

    /* ═══════════════════════════════════════════
       GLOWING BUBBLE SIDEBAR
    ═══════════════════════════════════════════ */
    .bubble-sidebar {
        position: fixed; top: 20px; left: 20px; height: calc(100vh - 40px); width: 65px; 
        border-radius: 25px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden; z-index: 100;
        display: flex; flex-direction: column; align-items: center; padding: 20px 0;
    }
    .bubble-sidebar:hover { width: 250px; }
    
    .bubble-sidebar::before {
        content: ''; position: absolute; top: 50%; left: 50%; width: 200vh; height: 200vh;
        background: conic-gradient(transparent, #ff00aa 15%, transparent 30%, #00e5ff 65%, transparent 85%);
        transform: translate(-50%, -50%); animation: rotateGlow 3.5s linear infinite; filter: blur(15px) brightness(1.5); z-index: -2;
    }
    .bubble-sidebar::after {
        content: ''; position: absolute; inset: 4px; background: rgba(15, 15, 20, 0.9);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 21px; z-index: -1;
    }
    @keyframes rotateGlow { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    
    .bubble-sidebar > * { position: relative; z-index: 1; }
    .centered-buttons { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; margin-top: 20px; padding: 0 10px; }
    .bubble-btn {
        display: flex; align-items: center; width: 45px; height: 45px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.05); box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1), 0 5px 15px rgba(0,0,0,0.4);
        border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: all 0.3s ease; overflow: hidden;
    }
    .bubble-sidebar:hover .bubble-btn { width: 100%; border-radius: 15px; }
    .bubble-btn:hover { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); transform: translateY(-2px); }
    .bubble-icon { min-width: 24px; height: 24px; color: #888; margin-left: 10px; transition: color 0.3s ease; }
    .bubble-btn:hover .bubble-icon { color: #fff; }
    .bubble-text { color: #fff; font-size: 16px; margin-left: 15px; opacity: 0; white-space: nowrap; transition: opacity 0.3s ease; }
    .bubble-sidebar:hover .bubble-text { opacity: 1; transition-delay: 0.1s; }

    #historyBtn { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); }
    #historyBtn .bubble-icon { color: #fff; }

    /* ═══════════════════════════════════════════
       MAIN HISTORY CONTAINER
    ═══════════════════════════════════════════ */
    .main-wrapper {
        margin-left: 100px; padding: 40px; width: calc(100% - 100px); 
        display: flex; justify-content: center; align-items: flex-start;
    }

    .container {
        width: 100%; max-width: 800px; background: transparent; padding: 10px;
    }
    
    h1 { margin: 0 0 25px 0; font-family: var(--font-display); font-weight: 800; font-size: 36px; background: linear-gradient(90deg, #fff, #888); -webkit-background-clip: text; color: transparent; }
    
    .search-bar {
        width: 100%; padding: 18px 20px; background: rgba(25, 25, 30, 0.6); border: 1px solid var(--border);
        border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 30px; outline: none;
        backdrop-filter: blur(10px); transition: border-color 0.3s ease, box-shadow 0.3s ease; font-family: var(--font-mono);
    }
    .search-bar:focus { border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
    
    .history-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 20px; }

    /* ═══════════════════════════════════════════
       🎬 WAPAS AAYA PRIME VIDEO GLOWING LAYOUT 🎬
    ═══════════════════════════════════════════ */
    .history-card {
        position: relative; background: rgba(25, 25, 30, 0.6);
        border: 1px solid var(--border); border-radius: 16px;
        overflow: hidden; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        backdrop-filter: blur(10px); display: flex; flex-direction: column;
    }

    /* 🔥 THE GLOWING ORBS (Light) 🔥 */
    .history-card::before, .history-card::after {
        content: ''; position: absolute; z-index: 0; border-radius: 50%; 
        filter: blur(35px); opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease; pointer-events: none;
    }
    .history-card::before { width: 120px; height: 120px; background: #8b5cf6; top: -30px; right: -20px; transform: scale(0.8); }
    .history-card::after { width: 120px; height: 120px; background: #f43f5e; bottom: -30px; left: -20px; transform: scale(0.8); }

    .history-card:hover { transform: scale(1.02); border-color: rgba(244, 63, 94, 0.4); box-shadow: 0 15px 35px rgba(0,0,0,0.6); background: rgba(30, 30, 35, 0.95); z-index: 10; }
    .history-card:hover::before, .history-card:hover::after { opacity: 0.35; transform: scale(1.2); }

    /* CARD HEADER (Hamesha dikhega) */
    .card-header {
        position: relative; z-index: 1; padding: 20px 25px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid transparent; transition: border-color 0.4s;
    }
    .h-date { font-family: var(--font-display); font-size: 20px; font-weight: bold; color: #fff; }
    .h-time { font-family: var(--font-mono); font-size: 20px; font-weight: bold; color: #4DA8FF; text-shadow: 0 0 10px rgba(77,168,255,0.3); }

    .history-card:hover .card-header { border-bottom: 1px dashed rgba(255,255,255,0.1); }

    /* ⬇️ PRIME VIDEO DROPDOWN DETAILS (Hover par khulega) ⬇️ */
    .card-details {
        position: relative; z-index: 1; max-height: 0; opacity: 0; overflow: hidden;
        transition: max-height 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease, padding 0.4s ease;
        padding: 0 25px; 
    }
    
    .history-card:hover .card-details {
        max-height: 300px; opacity: 1; padding: 25px;
    }

    /* 2-COLUMN DESIGN INSIDE ACCORDION */
    .details-columns { display: flex; gap: 30px; align-items: stretch; }

    /* LEFT SIDE: Badges & Button */
    .card-left { display: flex; flex-direction: column; justify-content: space-between; gap: 15px; width: 45%; }
    
    .stats-row { display: flex; gap: 10px; }
    .stat-badge { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; border: 1px solid; display: flex; align-items: center; gap: 5px; width: 100%; justify-content: center; }
    .stat-badge.done { color: #3DFF8F; border-color: rgba(61, 255, 143, 0.4); background: rgba(61,255,143,0.1); }
    .stat-badge.pend { color: #f43f5e; border-color: rgba(244, 63, 94, 0.4); background: rgba(244,63,94,0.1); }

    /* ═══════════════════════════════════════════
       🔮 TERA TEXT FILE WALA AESTHETIC BUTTON 🔮
       (Tailwind classes converted to Pure CSS)
    ═══════════════════════════════════════════ */
    .aesthetic-btn {
        position: relative;
        background-color: #262626; /* neutral-800 */
        border: 1px solid #404040;
        color: #f9fafb;
        padding: 12px 15px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.5s ease;
        text-align: left;
        width: 100%;
        display: block;
        font-family: var(--font-display);
    }
    .aesthetic-btn span {
        position: relative;
        z-index: 20; /* Keeps text above lights */
        transition: color 0.5s ease;
    }
    
    /* Violet Orb (Top Right) */
    .aesthetic-btn::before {
        content: ''; position: absolute;
        width: 48px; height: 48px;
        right: 4px; top: 4px;
        background-color: #8b5cf6; /* violet-500 */
        border-radius: 50%;
        filter: blur(16px);
        z-index: 10;
        transition: all 0.5s ease;
    }
    /* Rose Orb (Bottom Right) */
    .aesthetic-btn::after {
        content: ''; position: absolute;
        width: 80px; height: 80px;
        right: 32px; top: 12px;
        background-color: #fda4af; /* rose-300 */
        border-radius: 50%;
        filter: blur(16px);
        z-index: 10;
        transition: all 0.5s ease;
    }

    /* Button Hover Effects */
    .aesthetic-btn:hover {
        border-color: #fda4af;
        text-decoration: underline;
        text-underline-offset: 4px;
    }
    .aesthetic-btn:hover span {
        color: #fda4af; 
    }
    .aesthetic-btn:hover::before {
        right: 48px; bottom: -32px; top: auto;
        box-shadow: 20px 20px 20px 30px #a21caf;
    }
    .aesthetic-btn:hover::after {
        right: -32px;
    }

    /* RIGHT SIDE: Subjects Breakdown */
    .card-right {
        flex: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 10px;
        background: rgba(0,0,0,0.3); padding: 15px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
    }
    .subject-line { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 15px; color: #ddd; }
    .subj-name { display: flex; align-items: center; gap: 10px; }
    .subj-color { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); }
    .color-p { background: #4DA8FF; box-shadow: 0 0 8px rgba(77,168,255,0.5); }
    .color-c { background: #3DFF8F; box-shadow: 0 0 8px rgba(61,255,143,0.5); }
    .color-m { background: #FF7B4D; box-shadow: 0 0 8px rgba(255,123,77,0.5); }

    .total-line {
        display: flex; justify-content: space-between; align-items: center;
        border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 12px; margin-top: 5px;
        font-weight: bold; font-size: 18px; color: #fff; font-family: var(--font-display);
    }
    .total-box { border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 4px; font-family: var(--font-mono); color: #4DA8FF; text-shadow: 0 0 10px rgba(77,168,255,0.3); }

    @media (max-width: 768px) {
        .main-wrapper { margin-left: 80px; padding: 20px; width: calc(100% - 80px); }
        .details-columns { flex-direction: column; gap: 20px; }
        .card-left { width: 100%; }
        .history-card:hover .card-details { max-height: 500px; }
    }
</style>
</head>
<body>

    <<nav class="bubble-sidebar">
        <div class="bubble-btn" id="menuToggleBtn" style="margin: 0 10px; width: 45px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <span class="bubble-text">Menu</span>
        </div>
        <div class="centered-buttons">
            <div class="bubble-btn" id="homeBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="bubble-text">Dashboard</span>
            </div>
            <div class="bubble-btn" id="historyBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
                <span class="bubble-text">History</span>
            </div>
            <div class="bubble-btn" id="analyticsBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg>
                <span class="bubble-text">Analytics</span>
            </div>
            <div class="bubble-btn" id="tasksBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bubble-icon"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                <span class="bubble-text">Tasks</span>
            </div>
        </div>
    </nav>

<div class="main-wrapper">
    <div class="container">
        <h1>Study Vault 🗄️</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Enter date (e.g., 25/02/2026)...">
        
        <ul class="history-list" id="historyList"></ul>
        
    </div>
</div>
<script src="history.js"></script>
</body>
</html>
